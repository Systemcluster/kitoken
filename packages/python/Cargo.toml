[package]

name = "kitoken-python"
description = "Python bindings for Kitoken"
version = "0.10.1"
edition = "2024"
resolver = "2"
publish = false
workspace = "../.."


[lib]

name = "kitoken"
path = "src/lib.rs"
crate-type = ["cdylib"]


[dependencies]

kitoken = { path = "../..", default-features = false, features = ["all"] }

log = { version = "0.4.29" }
pyo3 = { version = "0.28.3", features = [
    "abi3",
    "abi3-py310",
    "serde",
    "extension-module",
    "generate-import-lib",
    "either",
] }
pyo3-log = "0.13.3"
serde-pyobject = "0.8.0"
either = "1.15.0"

[target.'cfg(any(target_arch = "x86", target_arch = "x86_64", target_arch = "aarch64"))'.dependencies]

mimalloc = { version = "0.1.44", features = ["local_dynamic_tls"] }
